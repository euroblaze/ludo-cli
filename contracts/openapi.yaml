components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  title: LUDO
  version: 0.1.0
openapi: 3.1.0
paths:
  /blueprints:
    get:
      operationId: list_blueprints_blueprints_get
      parameters:
      - in: query
        name: session_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  type: string
                title: Response List Blueprints Blueprints Get
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List blueprint blobs (optionally filter by session)
      tags:
      - blueprints
  /blueprints/{session_id}:
    get:
      operationId: get_blueprint_blueprints__session_id__get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                title: Response Get Blueprint Blueprints  Session Id  Get
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Fetch a session's blueprint JSON
      tags:
      - blueprints
  /healthz:
    get:
      operationId: healthz_healthz_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Healthz Healthz Get
                type: object
          description: Successful Response
      summary: Healthz
      tags:
      - health
  /knowledge/advise:
    get:
      operationId: advise_knowledge_advise_get
      parameters:
      - in: query
        name: error
        required: true
        schema:
          title: Error
          type: string
      - in: query
        name: failed_tool
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Failed Tool
      - in: query
        name: recent_tools
        required: false
        schema:
          default: ''
          title: Recent Tools
          type: string
      - in: query
        name: k
        required: false
        schema:
          default: 3
          maximum: 20
          minimum: 1
          title: K
          type: integer
      - in: query
        name: score_floor
        required: false
        schema:
          default: 0.55
          maximum: 1.0
          minimum: 0.0
          title: Score Floor
          type: number
      - in: query
        name: only_resolved
        required: false
        schema:
          default: true
          title: Only Resolved
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Advise Knowledge Advise Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Advisory for an error from past resolutions
      tags:
      - knowledge
  /knowledge/catalogue:
    get:
      operationId: catalogue_knowledge_catalogue_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Catalogue Knowledge Catalogue Get
                type: object
          description: Successful Response
      summary: The error catalogue
      tags:
      - knowledge
  /knowledge/catalogue/{pattern_id}:
    get:
      operationId: catalogue_pattern_knowledge_catalogue__pattern_id__get
      parameters:
      - in: path
        name: pattern_id
        required: true
        schema:
          title: Pattern Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Catalogue Pattern Knowledge Catalogue  Pattern Id  Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: One catalogue pattern
      tags:
      - knowledge
  /knowledge/renames:
    get:
      operationId: renames_knowledge_renames_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Renames Knowledge Renames Get
                type: object
          description: Successful Response
      summary: Rename-map coverage per version pair
      tags:
      - knowledge
  /knowledge/stats:
    get:
      operationId: stats_knowledge_stats_get
      parameters:
      - in: query
        name: sessions
        required: false
        schema:
          default: 20
          maximum: 500
          minimum: 1
          title: Sessions
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Stats Knowledge Stats Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Catalogue + rename + novel-error stats
      tags:
      - knowledge
  /knowledge/trajectories/search:
    get:
      operationId: trajectories_search_knowledge_trajectories_search_get
      parameters:
      - in: query
        name: query
        required: true
        schema:
          title: Query
          type: string
      - in: query
        name: k
        required: false
        schema:
          default: 3
          maximum: 20
          minimum: 1
          title: K
          type: integer
      - in: query
        name: only_resolved
        required: false
        schema:
          default: true
          title: Only Resolved
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Trajectories Search Knowledge Trajectories Search
                  Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Similarity search over past trajectories
      tags:
      - knowledge
  /sessions:
    get:
      operationId: list_sessions_sessions_get
      parameters:
      - in: query
        name: customer_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Customer Id
      - in: query
        name: status
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 500
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  additionalProperties: true
                  type: object
                title: Response List Sessions Sessions Get
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List recent sessions
      tags:
      - sessions
  /sessions/{session_id}:
    get:
      operationId: get_session_sessions__session_id__get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Get Session Sessions  Session Id  Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get one session
      tags:
      - sessions
  /sessions/{session_id}/events:
    get:
      operationId: events_stream_sessions__session_id__events_get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: SSE event stream for a session
      tags:
      - events
  /sessions/{session_id}/safety-events:
    get:
      operationId: session_safety_events_sessions__session_id__safety_events_get
      parameters:
      - in: path
        name: session_id
        required: true
        schema:
          title: Session Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: integer
                title: Response Session Safety Events Sessions  Session Id  Safety
                  Events Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Count safety events for a session
      tags:
      - sessions
  /surprises:
    get:
      operationId: surprises_surprises_get
      parameters:
      - in: query
        name: customer_id
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Customer Id
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: integer
                title: Response Surprises Surprises Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Intervention-type summary across sessions
      tags:
      - surprises
  /wiki:
    get:
      operationId: list_wiki_pages_wiki_get
      parameters:
      - in: query
        name: category
        required: false
        schema:
          default: customers
          pattern: ^(customers|pairs|types|gotchas|findings|odoo-concepts|odoo-catalog|odoo-versions)$
          title: Category
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  type: string
                title: Response List Wiki Pages Wiki Get
                type: array
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List wiki pages under a category
      tags:
      - wiki
  /wiki/lint:
    get:
      operationId: wiki_lint_wiki_lint_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  items:
                    type: string
                  type: array
                title: Response Wiki Lint Wiki Lint Get
                type: object
          description: Successful Response
      summary: Report orphan pages
      tags:
      - wiki
  /wiki/page:
    get:
      operationId: read_wiki_page_wiki_page_get
      parameters:
      - description: Relative path like 'episodic/customers/kj.md'
        in: query
        name: path
        required: true
        schema:
          description: Relative path like 'episodic/customers/kj.md'
          title: Path
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Read Wiki Page Wiki Page Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Read one wiki page
      tags:
      - wiki
