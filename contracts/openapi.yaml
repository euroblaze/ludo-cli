# Contract A — client-facing edge API (skeleton). Source of truth for generated
# clients (Swift/TS/Kotlin). Today FastAPI also serves the live schema at /openapi.json;
# canonicalize + enforce this artifact in CI (TODO(#96 Phase 1)).
openapi: 3.1.0
info:
  title: LUDO Gateway — Contract A
  version: 0.0.1
  description: Client-agnostic control-plane API in front of NATS. Bearer auth.
servers:
  - url: http://10.0.99.1:8080
paths:
  /healthz:
    get:
      operationId: healthz
      responses: { "200": { description: ok } }
  /api/v1/migrations:
    get:
      operationId: listMigrations
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: account-scoped migrations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Migration" } }
  /api/v1/migrations/{migration_id}:
    get:
      operationId: getMigration
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: migration_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: one migration, content: { application/json: { schema: { $ref: "#/components/schemas/Migration" } } } }
        "404": { description: not found }
  /api/v1/migrations/{migration_id}/approve:
    patch:
      operationId: approveMigration
      description: Enqueue-and-ack. Returns 202; result arrives on the event stream.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: migration_id, in: path, required: true, schema: { type: string } }
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
      responses:
        "202": { description: accepted }
  /api/v1/migrations/{migration_id}/events:
    get:
      operationId: streamMigrationEvents
      description: Resumable SSE (text/event-stream). Reconnect with Last-Event-ID.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: migration_id, in: path, required: true, schema: { type: string } }
        - { name: Last-Event-ID, in: header, required: false, schema: { type: string } }
      responses:
        "200": { description: event stream, content: { text/event-stream: {} } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    Migration:
      type: object
      properties:
        id: { type: string }
        account_id: { type: string }
        combo: { type: string }
        state_index: { type: integer }
        ludo_session_id: { type: string, nullable: true }
        agent_outcome: { type: string, nullable: true }
